# Render Blueprint — Dashboard → New → Blueprint (or sync if already linked).
#
# One small Node web service serves the static site (index.html, account.html,
# admin.html, audio/) plus the API (/api/channels, /api/auth/*, /api/me…).
#
# Since Tier 2a the database is SUPABASE (auth + Postgres in one, no 30-day
# expiry) — the Tier-1b Render Postgres is gone. Set these in the service's
# Environment tab (values live in your local .env, never in the repo):
#   DATABASE_URL              Supabase SESSION POOLER string (IPv4-safe):
#                             postgresql://postgres.<ref>:<password>@aws-…pooler.supabase.com:5432/postgres
#   SUPABASE_URL              https://<ref>.supabase.co
#   SUPABASE_PUBLISHABLE_KEY  sb_publishable_…
# ADMIN_KEY is generated by Render on first deploy — read it in the same tab;
# it unlocks /admin.html.
#
# Removing the old blueprint database: Render will flag `volt-transmission-db`
# as removed on sync — approve the deletion (channels now live in Supabase;
# the API re-seeds them there on first boot).
# The site still works with no API/env at all — the console falls back to its
# built-in channels and runs accountless (that's also the file:// behavior).
services:
  - type: web
    name: td-stream-control
    runtime: node
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: ADMIN_KEY
        generateValue: true
