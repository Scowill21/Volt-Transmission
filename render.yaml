# Render Blueprint — Dashboard → New → Blueprint (or sync if already linked).
#
# Tier 1b upgraded this from a static site to ONE small Node web service that
# serves the same static files (index.html, admin.html, audio/) AND the
# channels API (/api/channels) behind the console's CH/VJ dropdowns, plus a
# managed Postgres the API stores channels in.
#
# After the first deploy:
#   - grab ADMIN_KEY from the service's Environment tab → use it on /admin.html
#   - if the old *static* td-stream-control service still exists from before,
#     delete it in the dashboard so only this web service serves the site
# Note: Render's free Postgres plan expires after ~30 days; pick a paid plan
# (or point DATABASE_URL at Supabase) when this needs to live long-term.
# The site still works with no API at all — the console falls back to its
# built-in CHANNELS seed (that's also what file:// and plain static hosting do).
databases:
  - name: volt-transmission-db
    plan: free

services:
  - type: web
    name: td-stream-control
    runtime: node
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volt-transmission-db
          property: connectionString
      - key: ADMIN_KEY
        generateValue: true
